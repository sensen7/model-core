<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('仪表盘 - ModelCore')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container-fluid mt-4 flex-grow-1">
    <!-- 统计卡片 -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">今日调用量</h6>
                    <h2 th:text="${todayCalls}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">今日费用</h6>
                    <h2>$<span th:text="${#numbers.formatDecimal(todayCost, 1, 4)}">0.0000</span></h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">累计总费用</h6>
                    <h2>$<span th:text="${#numbers.formatDecimal(totalCost, 1, 4)}">0.0000</span></h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">账户余额</h6>
                    <h2>$<span th:text="${#numbers.formatDecimal(tenantBalance, 1, 4)}">0.0000</span></h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-secondary shadow-sm">
                <div class="card-body">
                    <h6 class="card-title">活跃 API Key</h6>
                    <h2 th:text="${activeKeys}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- 图表区域 -->
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">近 7 天调用量趋势</div>
                <div class="card-body">
                    <canvas id="callsChart" height="250"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">近 7 天费用趋势</div>
                <div class="card-body">
                    <canvas id="costsChart" height="250"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Webhook 余额预警设置 -->
    <div class="row g-4 mt-1">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header">余额预警 Webhook 设置</div>
                <div class="card-body">
                    <p class="text-muted small mb-3">
                        当账户余额低于 $1.00 时，系统将向以下地址发送 POST 通知。
                        兼容 Slack、Discord、企业微信机器人。同一租户 10 分钟内最多推送一次。
                    </p>
                    <!-- 保存成功提示 -->
                    <div th:if="${webhookSuccess}" class="alert alert-success py-2 small" th:text="${webhookSuccess}"></div>
                    <form action="/dashboard/webhook" method="post">
                        <div class="input-group">
                            <input type="url" name="webhookUrl" class="form-control"
                                   placeholder="https://hooks.slack.com/services/xxx 或留空表示不推送"
                                   th:value="${webhookUrl}">
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="/js/app.js"></script>
<script>
    // 加载调用量趋势图
    fetch('/api/stats/daily-calls?days=7')
        .then(r => r.json())
        .then(d => renderLineChart('callsChart', d.labels, d.data, '调用量', 'rgba(13,110,253,0.8)'));

    // 加载费用趋势图
    fetch('/api/stats/daily-costs?days=7')
        .then(r => r.json())
        .then(d => renderLineChart('costsChart', d.labels, d.data, '费用($)', 'rgba(25,135,84,0.8)'));
</script>
</body>
</html>
