<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('API Key 管理 - ModelCore')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container-fluid mt-4 flex-grow-1">
    <!-- 提示信息 -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 标题 + 创建按钮 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4><i class="bi bi-key"></i> API Key 管理</h4>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
            <i class="bi bi-plus-lg"></i> 创建 Key
        </button>
    </div>

    <!-- Key 列表表格 -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>名称</th>
                    <th>关联员工</th>
                    <th>Key</th>
                    <th>月用量上限</th>
                    <th>状态</th>
                    <th>过期时间</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="key : ${keys}">
                    <td th:text="${key.name}"></td>
                    <td>
                        <span th:if="${key.userId != null}" th:text="${userMap[key.userId]}" class="badge bg-info"></span>
                        <span th:if="${key.userId == null}" class="text-muted">未绑定</span>
                    </td>
                    <td><code class="key-value" th:text="${key.keyValue}"></code></td>
                    <td th:text="${key.monthlyLimit != null ? '$' + #numbers.formatDecimal(key.monthlyLimit, 1, 4) : '不限'}"></td>
                    <td>
                        <span th:if="${key.status == 'ACTIVE'}" class="badge bg-success">正常</span>
                        <span th:if="${key.status == 'DISABLED'}" class="badge bg-secondary">已禁用</span>
                        <span th:if="${key.status == 'EXPIRED'}" class="badge bg-danger">已过期</span>
                    </td>
                    <td th:text="${key.expiresAt != null ? #temporals.format(key.expiresAt, 'yyyy-MM-dd HH:mm') : '永不过期'}"></td>
                    <td th:text="${#temporals.format(key.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <div class="btn-group btn-group-sm">
                            <!-- 禁用/启用 -->
                            <form th:if="${key.status == 'ACTIVE'}" th:action="@{'/keys/' + ${key.id} + '/disable'}" method="post">
                                <button class="btn btn-outline-warning btn-sm" title="禁用">
                                    <i class="bi bi-pause-circle"></i>
                                </button>
                            </form>
                            <form th:if="${key.status != 'ACTIVE'}" th:action="@{'/keys/' + ${key.id} + '/enable'}" method="post">
                                <button class="btn btn-outline-success btn-sm" title="启用">
                                    <i class="bi bi-play-circle"></i>
                                </button>
                            </form>
                            <!-- 修改月用量上限 -->
                            <button class="btn btn-outline-secondary btn-sm" data-bs-toggle="modal"
                                    th:data-bs-target="'#limitModal' + ${key.id}" title="设置月用量上限">
                                <i class="bi bi-sliders"></i>
                            </button>
                        </div>
                        <!-- 月用量上限弹窗 -->
                        <div class="modal fade" th:id="'limitModal' + ${key.id}" tabindex="-1">
                            <div class="modal-dialog modal-sm">
                                <div class="modal-content">
                                    <form th:action="@{'/keys/' + ${key.id} + '/limit'}" method="post">
                                        <div class="modal-header">
                                            <h6 class="modal-title">设置月用量上限</h6>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body">
                                            <label class="form-label">月用量上限（美元，留空表示不限）</label>
                                            <input type="number" name="monthlyLimit" class="form-control"
                                                   step="0.01" min="0.01"
                                                   th:value="${key.monthlyLimit}"
                                                   placeholder="如：50.00">
                                        </div>
                                        <div class="modal-footer">
                                            <button type="submit" class="btn btn-primary btn-sm">保存</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(keys)}">
                    <td colspan="8" class="text-center text-muted py-4">暂无 API Key，点击上方按钮创建</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 创建 Key 弹窗 -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form action="/keys/create" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">创建 API Key</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Key 名称</label>
                        <input type="text" name="name" class="form-control" placeholder="如：生产环境" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">关联员工（留空不绑定）</label>
                        <select name="userId" class="form-select">
                            <option value="">-- 不绑定 --</option>
                            <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.username}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">月用量上限（美元，留空不限）</label>
                        <input type="number" name="monthlyLimit" class="form-control" step="0.01" placeholder="如：50.00">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">过期时间（留空永不过期）</label>
                        <input type="datetime-local" name="expiresAt" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
