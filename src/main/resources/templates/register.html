<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - ModelCore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">
                        <i class="bi bi-cpu"></i> 注册新租户
                    </h3>
                    <p class="text-center text-muted mb-4">创建企业账户，开始使用 AI API 服务</p>

                    <!-- 错误提示 -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form action="/register" method="post">
                        <div class="mb-3">
                            <label for="tenantName" class="form-label">企业名称</label>
                            <input type="text" class="form-control" id="tenantName" name="tenantName"
                                   placeholder="如：Acme Corp" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">管理员用户名</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="请输入用户名" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">邮箱</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="admin@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密码</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="请输入密码（至少 6 位）" minlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">注册</button>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-muted">已有账号？</span>
                        <a href="/login">返回登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
