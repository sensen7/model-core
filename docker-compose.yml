version: '3.8'

# ModelCore 一键部署配置
# 使用前请复制 .env.example 为 .env 并填写真实密码和 API Key
# 启动命令：docker compose up -d

services:

  # ---- 应用服务 ----
  app:
    build: .
    container_name: modelcore-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # 数据库连接
      - SPRING_DATASOURCE_URL=jdbc:mariadb://db:3306/model_core?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      # Redis 连接
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_DATA_REDIS_DATABASE=0
      # JWT 密钥（生产环境请替换为随机长字符串）
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - modelcore-net

  # ---- 数据库服务 ----
  db:
    image: mariadb:10.6
    container_name: modelcore-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=model_core
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - modelcore-net

  # ---- 缓存服务 ----
  redis:
    image: redis:7-alpine
    container_name: modelcore-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - modelcore-net

volumes:
  db-data:
  redis-data:

networks:
  modelcore-net:
    driver: bridge
